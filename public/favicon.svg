<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#181234"/>
      <stop offset="100%" stop-color="#2E1A6E"/>
    </linearGradient>
    <linearGradient id="fTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6CF1"/>
      <stop offset="100%" stop-color="#5B3FE0"/>
    </linearGradient>
    <linearGradient id="fRight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6D4CE8"/>
      <stop offset="100%" stop-color="#4A2FCB"/>
    </linearGradient>
    <linearGradient id="fLeft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A2FCB"/>
      <stop offset="100%" stop-color="#2E1A9E"/>
    </linearGradient>
    <linearGradient id="fBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A22B0"/>
      <stop offset="100%" stop-color="#210F70"/>
    </linearGradient>
  </defs>

  <!-- background: rounded square -->
  <rect x="0" y="0" width="256" height="256" rx="52" fill="url(#bg)"/>

  <!-- faceted gem / node mark -->
  <g>
    <!-- top facet -->
    <polygon points="128,44 74,128 128,128" fill="url(#fTop)"/>
    <polygon points="128,44 182,128 128,128" fill="url(#fRight)"/>
    <!-- left facet -->
    <polygon points="74,128 128,128 128,212" fill="url(#fLeft)"/>
    <!-- bottom/right facet -->
    <polygon points="182,128 128,128 128,212" fill="url(#fBottom)"/>

    <!-- highlight sliver for gem shine -->
    <polygon points="128,44 106,84 128,128" fill="#FFFFFF" opacity="0.16"/>

    <!-- fine facet edges -->
    <polyline points="128,44 74,128 128,212 182,128 128,44" fill="none" stroke="#0F0830" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="128" y1="44" x2="128" y2="212" stroke="#0F0830" stroke-width="1.5" opacity="0.6"/>
    <line x1="74" y1="128" x2="182" y2="128" stroke="#0F0830" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- three small orbit nodes representing AI / connectivity -->
  <circle cx="128" cy="44" r="7" fill="#D8CCFF"/>
  <circle cx="74" cy="128" r="5.5" fill="#B9A6FF" opacity="0.9"/>
  <circle cx="182" cy="128" r="5.5" fill="#B9A6FF" opacity="0.9"/>
</svg>
